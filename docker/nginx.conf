server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API проксируется на backend-контейнер (имя сервиса в compose-сети).
    # Префикс /api удаляется (proxy_pass с завершающим слэшем).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # локальный LLM может отвечать долго — увеличиваем таймауты
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # потоковая отдача (SSE /chat/stream): без буферизации, HTTP/1.1
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA: все прочие маршруты отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
